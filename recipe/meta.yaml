{% set name = "jupyterlab_miami_nights" %}
{% set version = "0.4.3" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/jupyterlab_miami_nights-{{ version }}.tar.gz
  sha256: d5978fb8e305722d53bee1ea7ac90b9d24f22ecfdce2e5002daaaa22bef6919d

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - jupyterlab ~=4.0
    - hatchling >=1.3.1
    - hatch-js
    - jupyterlab
    - pnpm
  run:
    - jupyterlab ~=4.0
    - python >={{ python_min }}

test:
  commands:
    - pip check
    - test -f "${PREFIX}/share/jupyter/labextensions/@timkpaine/jupyterlab_miami_nights/package.json"                                    # [unix]
    - if exist %PREFIX%\\share\\jupyter\\labextensions\\@timkpaine\\jupyterlab_miami_nights\\package.json (exit 0) else (exit 1)          # [win]
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/timkpaine/jupyterlab_miami_nights
  summary: Combination of VS Code's SynthWave '84 and JupyterLab's Neon Night
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jtpio
    - timkpaine
